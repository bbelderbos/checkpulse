app = "checkpulse"
primary_region = "ams"

[build]

[env]
  DATABASE_PATH = "/data/checkpulse.db"
  GEOLITE_DB_PATH = "/data/GeoLite2-Country.mmdb"
  SITE_ID = "belderbos.dev"
  ALLOWED_ORIGIN = "https://belderbos.dev"

[[mounts]]
  source = "checkpulse_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
